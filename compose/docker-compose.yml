# ==============================================================================
# DOCKER COMPOSE - vLLM + Open WebUI para TITAN (3x RTX PRO 6000 Blackwell)
# ==============================================================================
# Hardware: 3x NVIDIA RTX PRO 6000 Blackwell Max-Q (96 GB VRAM c/u = 288 GB)
# Driver: 595.58 | CUDA: 13.2 | SO: Ubuntu 24.04
#
# Los 3 modelos usan tp=2 (GPUs 0,1). Solo uno puede correr a la vez.
# Usar los scripts switch-*.sh para cambiar de modelo.
#
# Para arrancar:
#   docker compose --profile fp8 up -d
#
# Para cambiar de modelo:
#   ./switch-fp8.sh        (122B FP8)
#   ./switch-nvfp4.sh      (122B NVFP4)
#   ./switch-fp8-35b.sh    (35B FP8)
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # vLLM - Qwen3.5 NVFP4 (GPUs 0,1 — tp=2)
  # ----------------------------------------------------------------------------
  vllm-nvfp4:
    image: vllm/vllm-openai:latest
    container_name: titan-vllm
    ipc: host
    restart: unless-stopped
    profiles: ["nvfp4"]

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    command: >
      --model Sehyo/Qwen3.5-122B-A10B-NVFP4
      --trust-remote-code
      --tensor-parallel-size 2
      --max-model-len 131072
      --gpu-memory-utilization 0.9
      --kv-cache-dtype fp8

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

  # ----------------------------------------------------------------------------
  # vLLM - Qwen3.5 FP8 (GPUs 0,1 — tp=2)
  # ----------------------------------------------------------------------------
  vllm-fp8:
    image: vllm/vllm-openai:latest
    container_name: titan-vllm
    ipc: host
    restart: unless-stopped
    profiles: ["fp8"]

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    command: >
      --model Qwen/Qwen3.5-122B-A10B-FP8
      --trust-remote-code
      --tensor-parallel-size 2
      --max-model-len 131072
      --gpu-memory-utilization 0.9
      --kv-cache-dtype fp8

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

  # ----------------------------------------------------------------------------
  # vLLM - Qwen3.5 35B FP8 (GPUs 0,1 — tp=2)
  # ----------------------------------------------------------------------------
  vllm-fp8-35b:
    image: vllm/vllm-openai:latest
    container_name: titan-vllm
    ipc: host
    restart: unless-stopped
    profiles: ["fp8-35b"]

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    command: >
      --model Qwen/Qwen3.5-35B-A3B-FP8
      --trust-remote-code
      --tensor-parallel-size 2
      --max-model-len 131072
      --gpu-memory-utilization 0.9
      --kv-cache-dtype fp8

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

  # ----------------------------------------------------------------------------
  # Open WebUI (Interfaz gráfica)
  # ----------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: titan-webui
    restart: unless-stopped

    ports:
      - "3000:8080"

    environment:
      - OPENAI_API_BASE_URL=http://titan-vllm:8000/v1
      - OPENAI_API_KEY=none
      - WEBUI_AUTH=False

    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
