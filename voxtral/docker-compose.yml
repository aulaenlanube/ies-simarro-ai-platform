# ==============================================================================
# DOCKER COMPOSE - Voxtral TTS Frontend
# ==============================================================================
# El backend (vllm-omni) se ejecuta nativamente con ./start-voxtral.sh
# Este compose solo levanta el frontend web.
#
# Para arrancar todo:
#   1. ./start-voxtral.sh    (backend en GPU 2, puerto 8100)
#   2. docker compose up -d  (frontend web)
#
# Acceso HTTPS: https://<servidor>:3101  (certificado autofirmado)
# Acceso HTTP:  http://<servidor>:3100   (redirige automáticamente a 3101)
# ==============================================================================

services:
  tts-frontend:
    build: ./frontend
    container_name: titan-tts-frontend
    restart: unless-stopped
    expose:
      - "3100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VLLM_URL=http://host.docker.internal:8100

  tts-nginx:
    image: nginx:alpine
    container_name: titan-tts-nginx
    restart: unless-stopped
    ports:
      - "3101:443"
      - "3100:80"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ../certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - tts-frontend
