# ==============================================================================
# DOCKER COMPOSE - Voxtral TTS Frontend
# ==============================================================================
# El backend (vllm-omni) se ejecuta nativamente con ./start-voxtral.sh
# Este compose solo levanta el frontend web.
#
# Para arrancar todo:
#   1. ./start-voxtral.sh    (backend en GPU 2, puerto 8100)
#   2. docker compose up -d  (frontend web, puerto 3100)
# ==============================================================================

services:
  tts-frontend:
    build: ./frontend
    container_name: titan-tts-frontend
    restart: unless-stopped

    ports:
      - "3100:3100"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - VLLM_URL=http://host.docker.internal:8100
